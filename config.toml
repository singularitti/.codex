model = "gpt-5.5"
model_reasoning_effort = "high"
sandbox_mode = "danger-full-access"
approval_policy = "on-request"
personality = "pragmatic"
approvals_reviewer = "user"

[features]
hooks = true
unified_exec = true
apps = true
personality = true
shell_snapshot = true
multi_agent = true
prevent_idle_sleep = true
workspace_dependencies = true
memories = true
remote_connections = true
fast_mode = false

[[skills.config]]
path = "~/.codex/skills/.system/skill-creator/SKILL.md"
enabled = false

[[skills.config]]
path = "~/.codex/skills/.system/skill-installer/SKILL.md"
enabled = false

[[skills.config]]
path = "~/.codex/skills/spreadsheet/SKILL.md"
enabled = false

[tui]
status_line = ["model-with-reasoning", "current-dir", "project-root", "git-branch", "context-used", "five-hour-limit", "weekly-limit"]
theme = "catppuccin-frappe"
